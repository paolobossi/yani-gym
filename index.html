<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Yani Gym</title>
<style>
  :root{
    --bg:#000; --panel:#0d0f12; --panel-2:#171a1f; --line:#23272e;
    --txt:#f4f6f8; --muted:#8b93a1; --accent:#22c55e; --accent-d:#16351f;
    --blue:#3b82f6; --danger:#ef4444; --danger-bg:#3a1414;
    /* superset group colors */
    --g0:#2dd4bf; --g1:#a855f7; --g2:#f59e0b; --g3:#ec4899; --g4:#38bdf8; --g5:#84cc16;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}
  .app{max-width:640px;margin:0 auto;min-height:100vh;position:relative;}

  /* Top bar */
  .topbar-wrap{position:sticky;top:0;z-index:20;background:rgba(0,0,0,.82);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .topbar{padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display:flex;align-items:center;gap:10px;}
  .topbar h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px;flex:1;}
  .sticky-rest{position:relative;overflow:hidden;background:#10233b;margin:0;
    border-radius:0;padding:6px 0;text-align:center;cursor:pointer;}
  .sticky-rest-fill{position:absolute;left:0;top:0;bottom:0;width:100%;background:var(--blue);
    transition:width 1s linear;}
  .sticky-rest-time{position:relative;z-index:1;color:#fff;font-weight:800;font-size:14px;
    font-variant-numeric:tabular-nums;}
  .elapsed{font-size:15px;color:var(--txt);font-variant-numeric:tabular-nums;font-weight:800;
    flex:0 0 auto;background:var(--panel-2);padding:6px 10px;border-radius:9px;}
  .modal-sub{color:var(--muted);margin:-6px 0 16px;font-size:14px;}
  .iconbtn{width:40px;height:40px;border-radius:11px;background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
  .btn{padding:10px 16px;border-radius:11px;background:var(--panel-2);font-weight:600;font-size:15px;}
  .btn.primary{background:var(--accent);color:#04220f;font-weight:800;}
  .btn.blue{background:var(--blue);color:#fff;}
  .btn.ghost{background:transparent;color:var(--blue);font-weight:700;}
  .btn.danger{background:var(--danger-bg);color:#ff8080;}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:9px;}

  .screen{padding:16px 14px 120px;}
  .screen.home{padding-top:calc(env(safe-area-inset-top) + 20px);}
  .home-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;}
  .home-actions{display:flex;gap:8px;flex:0 0 auto;}
  .iconbtn.sync-synced{background:var(--accent-d);}
  .iconbtn.sync-offline{background:#3a2e12;}
  .iconbtn.sync-off{opacity:.55;}
  .welcome{flex:1;margin:0;font-size:31px;line-height:1.12;font-weight:800;letter-spacing:-.6px;}
  .muted{color:var(--muted);}
  .center-empty{text-align:center;color:var(--muted);padding:60px 20px;}

  /* Program groups */
  .prog-group{margin-bottom:24px;}
  .prog-title{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);margin:2px 0 11px 3px;}

  /* Workout list cards */
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;position:relative;}
  .wcard .body{flex:1;min-width:0;}
  .name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin:0 0 3px;}
  .wcard .name{font-size:18px;font-weight:700;margin:0;flex:1;min-width:0;}
  .wcard .meta{font-size:13px;color:var(--muted);}
  .last-tag{position:absolute;top:12px;right:14px;background:var(--accent);color:#04220f;font-size:10px;
    font-weight:800;padding:3px 8px;border-radius:7px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}
  .ongoing-tag{background:var(--blue);color:#fff;}
  .last-done{font-size:13px;color:var(--muted);margin:5px 0 0;display:flex;align-items:center;gap:5px;}
  .clk{width:13px;height:13px;flex:0 0 auto;}

  /* Workouts-per-week chart */
  .chart-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 16px 10px;margin-bottom:30px;}
  .chart-title{font-size:17px;font-weight:700;margin:0 0 12px;}
  .plot{position:relative;height:88px;}
  .plot .gl{position:absolute;left:0;right:28px;height:0;border-top:1px solid var(--line);}
  .plot .gl.target{border-top-color:#a855f7;opacity:.55;}
  .plot .yl{position:absolute;right:0;transform:translateY(-50%);font-size:13px;color:var(--muted);font-weight:600;}
  .plot .yl.target{color:#a855f7;}
  .plot .bars{position:absolute;left:0;right:28px;top:0;bottom:0;display:flex;align-items:flex-end;}
  .plot .bcol{flex:1;height:100%;display:flex;align-items:flex-end;justify-content:center;}
  .bar{width:56%;max-width:26px;border-radius:6px 6px 3px 3px;background:#3a2a63;transition:height .35s ease;}
  .bar.hit{background:#a855f7;}
  .chart-x{display:flex;margin-right:28px;margin-top:7px;}
  .chart-x span{flex:1;text-align:center;font-size:12px;color:var(--muted);}
  .wcard .chev{color:var(--muted);font-size:20px;}

  /* Exercise blocks */
  .ex{background:var(--panel);border-radius:var(--radius);margin-bottom:14px;
    border:1px solid var(--line);overflow:hidden;position:relative;}
  .ex.grouped{border-left:5px solid var(--gc);}
  .ss-band{display:flex;align-items:center;gap:8px;padding:8px 14px 0 14px;}
  .ss-tag{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    color:var(--gc);}
  .ex-head{padding:12px 14px 6px;display:flex;align-items:flex-start;gap:10px;}
  .ex-title{flex:1;min-width:0;}
  .ex-name{font-size:17px;font-weight:700;color:#8ab4ff;margin:0 0 3px;line-height:1.25;word-break:break-word;}
  .plan{font-size:15px;color:var(--txt);margin:0;line-height:1.4;font-weight:500;}
  .ex-actions{display:flex;gap:8px;flex:0 0 auto;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:9px;
    background:var(--panel-2);font-size:13px;font-weight:600;}
  .pill.video{background:#9a3412;color:#ffedd5;text-decoration:none;}
  .pill.video.empty{background:#9a3412;color:#ffedd5;}
  .pill.menu{width:36px;justify-content:center;color:var(--muted);}

  table.sets{width:100%;border-collapse:collapse;margin-top:4px;}
  table.sets th{font-size:12px;color:var(--muted);font-weight:600;text-align:center;
    padding:8px 4px;text-transform:none;vertical-align:middle;}
  table.sets th.set-c,table.sets td.set-c{width:44px;}
  table.sets th.prev-c{text-align:center;}
  table.sets th .tgt{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-top:2px;white-space:nowrap;}
  table.sets td{padding:5px 4px;text-align:center;vertical-align:middle;}
  table.sets tr.done td{background:var(--accent-d);}
  .setnum{width:34px;height:32px;border-radius:8px;background:var(--panel-2);
    display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
  tr.done .setnum{background:#1c4028;}
  table.sets tr.next-row td{background:rgba(234,179,8,.16);}
  tr.next-row .setnum{background:#4a3b08;color:#fde68a;}
  .prev{font-size:13px;color:var(--muted);text-align:center;white-space:nowrap;}
  .prev.has{color:#c9d2de;}
  .cell-dash{width:70px;max-width:78px;height:38px;display:inline-flex;align-items:center;
    justify-content:center;color:var(--muted);font-weight:700;font-size:16px;}
  .cell-in{width:70px;max-width:78px;height:38px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--txt);text-align:center;font-size:16px;font-weight:600;
    padding:0 4px;}
  .cell-in:focus{outline:none;border-color:var(--blue);background:#0e1830;}
  tr.done .cell-in{background:rgba(0,0,0,.25);border-color:rgba(34,197,94,.55);color:var(--txt);}
  .time-pair{display:flex;align-items:center;justify-content:center;gap:3px;}
  .time-in{width:38px;max-width:38px;padding:0;}
  .time-colon{color:var(--muted);font-weight:800;font-size:16px;}
  .check{width:40px;height:34px;border-radius:9px;background:var(--panel-2);
    display:inline-flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);}
  tr.done .check{background:var(--accent);color:#04220f;}
  .addset{width:calc(100% - 24px);margin:8px 12px 12px;padding:11px;border-radius:10px;
    background:var(--panel-2);color:#cbd3df;font-weight:600;font-size:14px;text-align:center;}
  /* per-set rest divider */
  .rest-tr td{padding:3px 14px;}
  .rest-line{position:relative;text-align:center;cursor:pointer;padding:7px 0;}
  .rest-line::before{content:'';position:absolute;left:0;right:0;top:50%;height:2px;
    background:#173154;border-radius:2px;}
  .rest-line span{position:relative;background:var(--panel);padding:0 12px;color:var(--blue);
    font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;}
  .rest-bar{position:relative;overflow:hidden;background:#10233b;text-align:center;font-weight:800;
    font-size:15px;padding:11px 0;border-radius:9px;cursor:pointer;}
  .rest-fill{position:absolute;left:0;top:0;bottom:0;width:100%;background:var(--blue);
    transition:width 1s linear;}
  .rest-bar-time{position:relative;z-index:1;color:#fff;font-variant-numeric:tabular-nums;}

  .add-ex-row{display:flex;gap:10px;margin-top:6px;}
  .add-ex-row .btn{flex:1;}
  .finish-btn{width:100%;margin-top:14px;padding:16px;font-size:17px;}

  /* Rest timer floating */
  .rest-fab{position:fixed;right:16px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:40;
    background:var(--blue);color:#fff;border-radius:16px;padding:14px 18px;font-weight:800;
    font-size:15px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;
    max-width:calc(100% - 32px);}
  .rest-fab.running{background:#0b2e5e;border:1px solid var(--blue);}

  /* In-app video player */
  /* Saving-to-cloud loader */
  .save-overlay{position:fixed;inset:0;z-index:95;background:rgba(0,0,0,.55);
    display:flex;align-items:center;justify-content:center;}
  .save-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:28px 36px;display:flex;flex-direction:column;align-items:center;gap:14px;
    box-shadow:0 12px 32px rgba(0,0,0,.5);}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);
    border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .save-box span{color:var(--txt);font-weight:700;font-size:14px;}

  .video-overlay{position:fixed;inset:0;z-index:90;background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;padding:20px 8px;}
  .vid-title{font-size:16px;font-weight:700;color:#fff;text-align:center;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .vid-frame{width:100%;position:relative;aspect-ratio:16/9;}
  .vid-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:10px;}
  .vid-skel{position:absolute;inset:0;border-radius:10px;background:#1a1d22;overflow:hidden;}
  .vid-skel::after{content:'';position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);
    animation:shimmer 1.3s infinite;}
  @keyframes shimmer{100%{transform:translateX(100%);}}
  .vid-actions{display:flex;gap:12px;width:100%;justify-content:center;}
  .vid-more{background:#9a3412;color:#ffedd5;font-weight:800;font-size:15px;padding:15px 22px;
    border-radius:14px;text-decoration:none;text-align:center;flex:1;max-width:220px;
    display:flex;align-items:center;justify-content:center;gap:8px;}
  .vid-more svg{width:17px;height:17px;flex:0 0 auto;}
  .vid-close{background:rgba(255,255,255,.16);color:#fff;font-weight:800;font-size:15px;padding:15px 22px;
    border-radius:14px;border:1px solid rgba(255,255,255,.28);flex:1;max-width:220px;}

  .rest-overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.9);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    padding:24px;text-align:center;}
  .rest-time{font-size:84px;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums;}
  .rest-time.warn{color:var(--accent);}
  .rest-ctrls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .rest-ctrls .btn{min-width:70px;}
  .rest-presets{display:flex;gap:10px;}
  .rest-presets .btn{background:var(--panel-2);}

  /* Modal */
  .modal-bg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);
    display:flex;align-items:flex-end;justify-content:center;padding:0;}
  .modal{background:var(--panel);width:100%;max-width:640px;border-radius:18px 18px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);animation:slideup .18s ease;}
  @keyframes slideup{from{transform:translateY(30px);opacity:.5}to{transform:none;opacity:1}}
  .modal h3{margin:0 0 14px;font-size:19px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .field input,.field select{width:100%;height:46px;border-radius:11px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--txt);padding:0 12px;font-size:16px;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--blue);}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;height:44px;border-radius:11px;background:var(--panel-2);font-weight:600;
    border:1px solid var(--line);color:var(--muted);}
  .seg button.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .grp-choices{display:flex;flex-wrap:wrap;gap:8px;}
  .grp-dot{width:44px;height:44px;border-radius:11px;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;}
  .grp-dot.on{border-color:#fff;transform:scale(1.06);}
  .modal-actions{display:flex;gap:10px;margin-top:6px;}
  .modal-actions .btn{flex:1;}
  .modal-stack{display:flex;flex-direction:column;gap:10px;}
  .modal-stack .btn{width:100%;padding:14px;}

  .menu-sheet button{display:block;width:100%;text-align:left;padding:15px 6px;font-size:16px;
    border-bottom:1px solid var(--line);}
  .menu-sheet button:last-child{border-bottom:none;}
  .menu-sheet button.del{color:#ff7070;}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:100;
    background:#1f2937;color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .fab-add{width:calc(100% - 4px);padding:15px;border-radius:13px;background:var(--panel-2);
    color:var(--blue);font-weight:700;font-size:16px;border:1px dashed #2f3644;margin-top:4px;}
  .sess-line{font-size:12px;color:var(--muted);margin:2px 0 0;}
  .last-badge{font-size:12px;color:var(--muted);margin-top:2px;padding-left:14px;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ===================== Data layer ===================== */
const KEY = 'yaniGym.v2';
/* Cloud sync config — set these to your Supabase project to enable sync.
   Left blank => app runs local-only (no cloud). */
const SB_URL = 'https://nepkjebmtddpmdviwaxv.supabase.co';
const SB_KEY = 'sb_publishable_l9HdPDqOzNaroSmQh0pd-g_1uxouu03';
const SHOW_ADD_SET = false;   // hidden for now; flip to true to bring "+ Add Set" back
const GROUP_VARS = ['--g0','--g1','--g2','--g3','--g4','--g5'];
const GROUP_LETTERS = ['A','B','C','D','E','F'];
const WORKOUT_EMOJIS = ['🏋️','🦵','💪','🔥','🚴','🤸','🧘','⚡'];
function wProgram(w){ return w.program || 'Complete Gym'; }
function wEmoji(w){
  const n = (w.name||'').toLowerCase();
  if(/lower|squat|\bleg/.test(n)) return '🦵';
  if(/upper|bench|press|push|chest|arm/.test(n)) return '💪';
  if(/full/.test(n)) return '🔥';
  if(/deadlift|hinge|pull|back/.test(n)) return '🏋️';
  return '🏋️';
}

// Curated video links keyed by exercise name. Backfilled into empty slots on load,
// so adding a link here reaches existing installs without wiping logged data.
const VIDEOS = {
  'Scapular Pull-Up': 'https://youtu.be/BZo9h2Ct72I',
  'Romanian Deadlift (light)': 'https://youtu.be/GZAKFRNtxLY',
  'Semi-Kneeling Windmill': 'https://youtu.be/nHABhM_zaPE',
  'Deadbug': 'https://youtu.be/ItTVzWxiiz0',
  'Deadlift': 'https://youtu.be/op9kVnSso6Q',
  'Dumbbell Walking Lunges': 'https://youtu.be/h4BJTumn2pM',
  'Single-Leg Hop': 'https://youtu.be/qaiiGSvSppU',
  'Band Tricep Extension': 'https://youtu.be/hJkWQr9V-Hg',
  // Lime Gardens — same movement as Complete Gym's dumbbell walking lunge
  'DB Walking Lunge': 'https://youtu.be/h4BJTumn2pM',
  'DB Romanian Deadlift': 'https://youtu.be/hQgFixeXdZo',
  'DB Bench Glute Bridge / Hip Thrust': 'https://youtu.be/29OfN4ztW_g',
  'DB Calf Raise': 'https://www.youtube.com/shorts/ADITZCcUyVo',
  'Plank': 'https://youtu.be/pvIjsG5Svck',
  // Lime Gardens Day 1 — remaining exercises
  'Bodyweight Air Squat': 'https://www.youtube.com/watch?v=lcNmEtvrMGo',
  'Bodyweight Split Squat': 'https://www.youtube.com/watch?v=REflwhg0jNs',
  'Glute Bridge': 'https://www.youtube.com/watch?v=wPM8icPu6H8',
  'Goblet Squat': 'https://www.youtube.com/watch?v=zsN2WvklwDk',
  // Lime Gardens Day 2 — Upper Body
  'DB Shoulder Rotation (light)': 'https://www.youtube.com/watch?v=gOwur9N0cM0',
  'Band-free Scap Push-Up': 'https://www.youtube.com/watch?v=MN2X1cpFjqc',
  'DB Bench Press': 'https://www.youtube.com/watch?v=5Y3VZsLb1Ys',
  'DB Floor / Bench Press (light)': 'https://www.youtube.com/watch?v=5Y3VZsLb1Ys',
  'DB One-Arm Row (knee on bench)': 'https://www.youtube.com/watch?v=fURsHPHgssI',
  'DB Overhead Shoulder Press': 'https://www.youtube.com/watch?v=Vphi6UMhF7o',
  'DB Incline Bench Press': 'https://www.youtube.com/watch?v=sK4Rvug6ufo',
  'DB Bent-Over Reverse Fly': 'https://www.youtube.com/watch?v=d1QEddtoOq0',
  'DB Bicep Curl': 'https://www.youtube.com/watch?v=6DeLZ6cbgWQ',
  'DB Overhead Tricep Extension': 'https://www.youtube.com/watch?v=-Vyt2QdsR7E',
  // Lime Gardens Day 3 — Full Body
  'DB RDL (light)': 'https://youtu.be/hQgFixeXdZo',
  'DB Deadlift': 'https://www.youtube.com/watch?v=HMcXQyEqJ7A',
  'DB Bench Press (push-up alt)': 'https://www.youtube.com/watch?v=5Y3VZsLb1Ys',
  'DB Bulgarian Split Squat': 'https://www.youtube.com/watch?v=rrcJy4gI9ro',
  'DB Renegade Row': 'https://www.youtube.com/watch?v=NTl_ALR8Tlc',
  'DB Farmer Carry': 'https://www.youtube.com/watch?v=8OtwXwrJizk',
  'DB Russian Twist': 'https://www.youtube.com/watch?v=p_dPOhhgovg',
};
function ex(name, sets, reps, note, group, type){
  return { id: uid(), name, videoUrl: VIDEOS[name]||'', type:type||'reps', targetSets:sets, targetReps:reps, note:note||'', superset:group };
}
function limeGardensWorkouts(){
  return [
    { id: uid(), program:'Lime Gardens', name:'Day 1 — Lower Body', exercises:[
      ex('Bodyweight Air Squat', 2, '12', 'bodyweight', 0),
      ex('Bodyweight Split Squat', 2, '10 / leg', 'bodyweight', 0),

function migrate(d){

  d.workouts.forEach(w=>{ if(!w.program) w.program = 'Complete Gym'; });

let sbCode = localStorage.getItem('yaniGym.syncCode') || '';
let lastServerTs = localStorage.getItem('yaniGym.serverTs') || '';
let dirty = localStorage.getItem('yaniGym.dirty') === '1';
let syncStatus = 'off';
let pushTimer = null, pullTimer = null;

function syncConfigured(){ return !!(SB_URL && SB_KEY); }
function syncOn(){ return !!(syncConfigured() && sbCode); }
async function sbRpc(fn, args){
  const r = await fetch(SB_URL + '/rest/v1/rpc/' + fn, {
    method:'POST',
    headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify(args)
  });
  if(!r.ok) throw new Error(fn+' '+r.status);
  return r.json();
}
function markDirty(){ dirty=true; try{localStorage.setItem('yaniGym.dirty','1');}catch(e){} schedulePush(); }
function schedulePush(){ if(!syncOn()) return; clearTimeout(pushTimer); pushTimer=setTimeout(pushRemote,1500); }
function setSyncStatus(s){ syncStatus=s; const b=document.getElementById('syncBtn'); if(b) b.className='iconbtn sync-'+s; }
async function pushRemote(){
  if(!syncOn() || !dirty) return;
  try{
    setSyncStatus('syncing');
    const ts = await sbRpc('yani_set', { p_profile:sbCode, p_data:DB });
    lastServerTs = (typeof ts==='string') ? ts : (ts && ts.updated_at) || lastServerTs;
    localStorage.setItem('yaniGym.serverTs', lastServerTs);
    dirty=false; localStorage.setItem('yaniGym.dirty','0');
    setSyncStatus('synced');
  }catch(e){ setSyncStatus('offline'); }
}
async function pullRemote(){
  if(!syncOn()) return;
  try{
    const rows = await sbRpc('yani_get', { p_profile:sbCode });
    const row = Array.isArray(rows) ? rows[0] : rows;
    if(!row){ if(dirty) await pushRemote(); setSyncStatus('synced'); return; }
    if(row.updated_at !== lastServerTs){
      if(dirty){ await pushRemote(); }             // local unpushed edits win
      else {                                        // remote changed elsewhere -> adopt
        DB = migrate(row.data); save(true);
        lastServerTs = row.updated_at; localStorage.setItem('yaniGym.serverTs', row.updated_at);
        if(!document.getElementById('modalBg') && !document.getElementById('videoOverlay')) render();
      }
    }
    setSyncStatus('synced');
  }catch(e){ setSyncStatus('offline'); }
}
function startSyncLoops(){
  clearInterval(pullTimer);
  if(!syncOn()){ setSyncStatus('off'); return; }
  if(dirty) schedulePush();
  pullRemote();
  pullTimer = setInterval(pullRemote, 25000);
}
function syncLabel(){
  return ({off:'Off', synced:'✓ Synced to cloud', syncing:'Syncing…',

async function connectSync(){
  const code = (val('newCode')||'').trim(); if(!code) return;
  sbCode = code; localStorage.setItem('yaniGym.syncCode', code);
  lastServerTs=''; localStorage.setItem('yaniGym.serverTs','');
  closeModal(); setSyncStatus('syncing');
  try{
    const rows = await sbRpc('yani_get', { p_profile:code });
    const row = Array.isArray(rows) ? rows[0] : rows;
    if(row && row.data){
      const localHas = DB.sessions && DB.sessions.length;
      if(localHas && !confirm("This code already has data in the cloud. Load it and replace this device's data?")){
        dirty=true; localStorage.setItem('yaniGym.dirty','1'); await pushRemote();   // keep local, overwrite cloud
      } else {
        DB = migrate(row.data); save(true);
        lastServerTs=row.updated_at; localStorage.setItem('yaniGym.serverTs', row.updated_at);
        dirty=false; localStorage.setItem('yaniGym.dirty','0');
      }
    } else {
      dirty=true; localStorage.setItem('yaniGym.dirty','1'); await pushRemote();     // first upload
    }
    render(); startSyncLoops(); toast('☁️ Cloud sync on');
  }catch(e){ setSyncStatus('offline'); toast('Could not reach cloud'); }

function previousFor(exId){
  for(let i=DB.sessions.length-1;i>=0;i--){
    const log = DB.sessions[i].log[exId];
    if(log && log.length) return log;
  }
  return null;
}
function lastSessionDate(workoutId){
  for(let i=DB.sessions.length-1;i>=0;i--){
    if(DB.sessions[i].workoutId===workoutId) return DB.sessions[i].date;
  }
  return null;
}

/* Monday-start of the week containing d */
function weekStart(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; }
/* sessions grouped into the last n weeks (oldest→newest) */
function weeklyCounts(n){
  const cur=weekStart(new Date());
  const weeks=[];
  for(let i=n-1;i>=0;i--){ const ws=new Date(cur); ws.setDate(cur.getDate()-i*7); weeks.push({start:ws,count:0}); }
  const idx={}; weeks.forEach((w,i)=>idx[w.start.getTime()]=i);
  DB.sessions.forEach(s=>{ const k=weekStart(new Date(s.date)).getTime(); if(k in idx) weeks[idx[k]].count++; });
  return weeks;
}

/* ---------- Workout ---------- */
function ensureDraft(w){
  if(!DB.drafts[w.id]) DB.drafts[w.id] = {};
  const draft = DB.drafts[w.id];
  w.exercises.forEach(ex=>{
    if(!draft[ex.id]){
      const prev = previousFor(ex.id);
      const rows = Math.max(ex.targetSets||3, prev?prev.length:0) || 3;
      draft[ex.id] = Array.from({length:rows}, ()=>({kg:'',reps:'',time:'',done:false}));
    }
  });
  return draft;
}

/* Order sets the way they're actually performed: supersets interleave
   round-by-round across their exercises, standalone exercises go in order. */
function buildSlotOrder(w,draft){
  const slots=[]; const exs=w.exercises; let idx=0;
  while(idx<exs.length){
    const cur=exs[idx];
    if(cur.superset==null){
      (draft[cur.id]||[]).forEach((r,i)=>slots.push({exId:cur.id,i}));
      idx++;
    } else {
      let j=idx; const group=[];
      while(j<exs.length && exs[j].superset===cur.superset){ group.push(exs[j]); j++; }
      const maxRows=Math.max(0,...group.map(g=>(draft[g.id]||[]).length));
      for(let r=0;r<maxRows;r++){
        group.forEach(g=>{ if(draft[g.id] && draft[g.id][r]) slots.push({exId:g.id,i:r}); });
      }
      idx=j;
    }
  }
  return slots;
}
function nextPendingSlot(w,draft){
  return buildSlotOrder(w,draft).find(s=>!draft[s.exId][s.i].done) || null;
}
function scrollToNextSet(){
  const el=document.getElementById('nextset');
  if(!el) return;
  // anchor on the exercise's title, not the row, so the sticky header/rest bar never covers it
  const exBlock = el.closest('.ex');
  const target = (exBlock && exBlock.querySelector('.ex-head')) || el;
  const wrap = document.querySelector('.topbar-wrap');
  const headerH = wrap ? wrap.getBoundingClientRect().height : 0;
  const y = window.scrollY + target.getBoundingClientRect().top - headerH - 12;
  window.scrollTo({top: Math.max(0,y), behavior:'smooth'});
}

               onchange="setVal('${w.id}','${ex.id}',${i},'kg',this.value)"></td>`;
        setTr = `<tr${rowId} class="${rowCls}">

          <td><button class="check" onclick="toggleDone('${w.id}','${ex.id}',${i})">✓</button></td>
        </tr>`;
      }
      return setTr + restRow(ex, i, colspan);
    }).join('');

    const addSetBtn = SHOW_ADD_SET
      ? `<button class="addset" onclick="addSet('${w.id}','${ex.id}')">+ Add Set (${fmtTime(exRest(ex))})</button>`
      : '';

      ${ssBand}
      ${head}
      <table class="sets"><thead><tr>${cols}</tr></thead><tbody>${body}</tbody></table>
      ${addSetBtn}
    </div>`;
  });

  app.innerHTML = `
    <div class="topbar-wrap">
      <div class="topbar">
        <button class="iconbtn" onclick="confirmExit('${w.id}')">‹</button>
        <h1>${wEmoji(w)} ${esc(w.name)}</h1>

      </div>
      <button class="btn primary finish-btn" onclick="confirmExit('${w.id}')">Finish Workout</button>
    </div>`;
  updateRestFab();
}

/* extract an 11-char YouTube id from watch / youtu.be / shorts / embed URLs */
function ytId(url){

/* ===================== Set edits ===================== */
function setVal(wid,exid,i,field,val){
  DB.drafts[wid][exid][i][field]=val; save();
}
function setTimePart(wid,exid,i){
  const mEl=document.getElementById('tmin_'+exid+'_'+i), sEl=document.getElementById('tsec_'+exid+'_'+i);
  const mRaw=(mEl.value||'').trim(), sRaw=(sEl.value||'').trim();
  if(mRaw==='' && sRaw===''){ DB.drafts[wid][exid][i].time=''; save(); return; }
  const m=Math.max(0,parseInt(mRaw)||0), s=Math.min(59,Math.max(0,parseInt(sRaw)||0));
  DB.drafts[wid][exid][i].time = m*60+s; save();
}
function toggleDone(wid,exid,i){
  const row = DB.drafts[wid][exid][i];
  row.done=!row.done; save();
  if(row.done){
    // auto-fill from placeholder/previous if empty
    const prev = previousFor(exid);
    if(prev && prev[i]){
      const ex = findW(wid).exercises.find(e=>e.id===exid);
      if(ex.type==='time'){ if(row.time==='') row.time=prev[i].time; }
      else { if(row.kg==='')row.kg=prev[i].kg; if(row.reps==='')row.reps=prev[i].reps; }
      save();
    }
    startRestFor(exid,i);      // renders the countdown bar under this set
    scrollToNextSet();
  } else {
    if(rest.anchor && rest.anchor.exId===exid && rest.anchor.setIdx===i) stopRest();
    renderWorkout();
  }
}
function addSet(wid,exid){
  const arr=DB.drafts[wid][exid];
  const last=arr[arr.length-1]||{};
  arr.push({kg:last.kg||'',reps:'',time:'',done:false});
  save(); renderWorkout();
}

/* ===================== Finish ===================== */
async function finishWorkout(wid){
  closeModal();
  const w=findW(wid); const draft=DB.drafts[wid]||{};
  const log={};
  let any=false;
  w.exercises.forEach(ex=>{
    const rows=(draft[ex.id]||[]).filter(r=>r.done && (ex.type==='time'? r.time!=='':(r.kg!==''||r.reps!=='')));
    if(rows.length){
      log[ex.id]=rows.map(r=> ex.type==='time'?{time:num(r.time)}:{kg:num(r.kg),reps:num(r.reps)});
      any=true;
    }
  });
  if(!any){
    if(!confirm('No sets were checked off. Finish without saving progress?')) return;
    delete DB.drafts[wid]; activeWorkout=null; save();
    await finishSyncFlow();
    return;
  }
  DB.sessions.push({ id:uid(), workoutId:wid, date:new Date().toISOString(), log });
  delete DB.drafts[wid];
  activeWorkout=null;
  save();
  await finishSyncFlow('💪 Session saved!');
}
/* push to the cloud right away (not the usual debounce) while still on the workout screen,
   with a small spinner overlay — Ayanna may lock her phone straight after finishing, and a
   queued background timer could get skipped. Only navigate home once it's settled. */
async function finishSyncFlow(localMsg){
  // always show the saving spinner, even with no cloud sync connected on this device —
  // consistent feedback beats a silent instant jump to the home screen
  clearTimeout(pushTimer);
  showSaveOverlay();
  const started = Date.now();
  if(syncOn()) await pushRemote();
  const minVisible = 1000;   // fast pushes can resolve in well under 1s — keep the spinner readable
  const rest = minVisible - (Date.now()-started);
  if(rest > 0) await new Promise(r=>setTimeout(r, rest));
  hideSaveOverlay();
  go('home');
  if(!syncOn()){ if(localMsg) toast(localMsg); return; }
  toast(syncStatus==='synced'
    ? (localMsg ? localMsg+' · synced ☁️' : '☁️ Synced')
    : (localMsg ? localMsg+' — will sync when online' : '💪 Saved — will sync when back online'));
}
function showSaveOverlay(){
  const o=document.createElement('div'); o.className='save-overlay'; o.id='saveOverlay';
  o.innerHTML=`<div class="save-box"><div class="spinner"></div><span>Saving…</span></div>`;
  document.body.appendChild(o);
}

/* ===================== Rest timer ===================== */
let rest = { remaining:0, total:0, timer:null, running:false, anchor:null };
/* start a rest anchored to a specific set — shows the inline countdown bar */
function startRestFor(exId,setIdx){
  const ex=findW(view.workoutId).exercises.find(e=>e.id===exId);
  rest.total=exRest(ex); rest.remaining=rest.total; rest.running=true; rest.anchor={exId,setIdx};
  tickLoop(); renderWorkout();
}
/* manual open of the full-screen timer (floating button / tapping the bar) */
function openRest(){
  if(!rest.running){ rest.total=DB.settings.restDefault; rest.remaining=rest.total; rest.anchor=null; }
  showRestOverlay();
}
function tickLoop(){
  clearInterval(rest.timer);
  rest.timer=setInterval(()=>{
    rest.remaining--;
    if(rest.remaining<=0){ endRest(true); return; }
    updateRestDisplays();
  },1000);
}
/* end naturally (beep) or via skip/uncheck (silent) */
function endRest(beeped){
  clearInterval(rest.timer); rest.running=false; rest.remaining=0; rest.anchor=null;
  const o=document.getElementById('restOverlay'); if(o)o.remove();
  if(beeped){ beep(); toast('⏰ Rest over!'); }
  updateRestFab();
  if(view.screen==='workout') renderWorkout();
}
function stopRest(){ endRest(false); }
/* just hide the full-screen view; the countdown (if any) keeps running in the background */
function closeRestOverlay(){ const o=document.getElementById('restOverlay'); if(o) o.remove(); }
function toggleRest(){
  if(rest.running){ clearInterval(rest.timer); rest.running=false; }
  else { rest.running=true; tickLoop(); }
  updateRestDisplays(); updateRestFab();
}
function adjustRest(sec){
  rest.remaining=Math.max(0,rest.remaining+sec);
  rest.total=Math.max(rest.total,rest.remaining);
  updateRestDisplays();
}
function setRestPreset(sec){
  rest.total=sec; rest.remaining=sec; DB.settings.restDefault=sec; save();
  if(!rest.running){ rest.running=true; tickLoop(); }
  updateRestDisplays(); updateRestFab();
}
/* live countdown, pinned under the header so it stays visible while scrolling */
function stickyRestBar(){
  if(!rest.running) return '';
  return `<div class="sticky-rest" id="stickyRest" onclick="openRest()">
    <div class="sticky-rest-fill" id="stickyFill" style="width:${restPct()}%"></div>
    <span class="sticky-rest-time" id="stickyTime">${fmtTime(rest.remaining)}</span>
  </div>`;
}
/* update every live display: sticky bar, floating fab, overlay */
function updateRestDisplays(){
  const fill=document.getElementById('stickyFill'); if(fill) fill.style.width=restPct()+'%';
  const st=document.getElementById('stickyTime'); if(st) st.textContent=fmtTime(rest.remaining);
  updateRestFab();
  const t=document.getElementById('restTime');
  if(t){ t.textContent=fmtTime(rest.remaining); t.classList.toggle('warn',rest.remaining<=10); }
  const b=document.getElementById('restPlayBtn'); if(b) b.textContent=rest.running?'Pause':'Start';
}
function showRestOverlay(){
  const o=document.createElement('div'); o.className='rest-overlay'; o.id='restOverlay';
  o.innerHTML=`
    <div class="rest-time" id="restTime">${fmtTime(rest.remaining)}</div>
    <div class="rest-ctrls">
      <button class="btn sm" onclick="adjustRest(-15)">−15s</button>
      <button class="btn blue" id="restPlayBtn" onclick="toggleRest()">${rest.running?'Pause':'Start'}</button>
      <button class="btn sm" onclick="adjustRest(15)">+15s</button>
    </div>
    <div class="rest-presets">
      <button class="btn sm" onclick="setRestPreset(60)">1:00</button>
      <button class="btn sm" onclick="setRestPreset(90)">1:30</button>
      <button class="btn sm" onclick="setRestPreset(120)">2:00</button>
      <button class="btn sm" onclick="setRestPreset(180)">3:00</button>
    </div>
    <button class="btn ghost" onclick="closeRestOverlay()">Close</button>`;
  o.addEventListener('click',e=>{ if(e.target===o) closeRestOverlay(); });
  document.body.appendChild(o);
  if(!rest.running && rest.remaining>0){ /* wait for start */ }
}

function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,0.25,0.5].forEach(t=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.001,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.18);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.2);
    });
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

  modal(`<div class="menu-sheet">
    ${cloud}
    <button onclick="exportData()">⬇️  Export data (.json) — ${n} logged session${n!==1?'s':''}</button>
    <button onclick="importData()">⬆️  Import data (restore backup)</button>
  </div>`);
}
function exportData(){
  const exName={}, wName={};
  DB.workouts.forEach(w=>{ wName[w.id]=w.name; w.exercises.forEach(e=>exName[e.id]=e.name); });
  const out = {
    app: 'Yani Gym',
    exportedAt: new Date().toISOString(),
    // human / AI friendly view
    program: DB.workouts.map(w=>({
      block: wProgram(w),
      workout: w.name,
      exercises: w.exercises.map(e=>({
        name:e.name, type:e.type, sets:e.targetSets, targetReps:e.targetReps,
        startingLoad:e.note, superset: e.superset==null?null:GROUP_LETTERS[e.superset%6]
      }))
    })),
    history: DB.sessions.map(s=>({
      date: s.date,
      workout: wName[s.workoutId] || s.workoutId,
      exercises: Object.entries(s.log).map(([id,rows])=>({ name: exName[id]||id, sets: rows }))
    })),
    // exact snapshot for lossless re-import
    _raw: DB
  };
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'yani-gym-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  closeModal(); toast('📄 Data exported');
}
function importData(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='application/json,.json';
  inp.onchange = ()=>{
    const f = inp.files && inp.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      let d; try{ d = JSON.parse(r.result); }catch(e){ alert('That file is not valid JSON.'); return; }
      const raw = d._raw ? d._raw : d;
      if(!raw || !raw.workouts || !Array.isArray(raw.workouts)){ alert("This doesn't look like a Yani Gym backup."); return; }
      if(!confirm('Replace all current data with this backup? This cannot be undone.')) return;
      DB = { workouts: raw.workouts, sessions: raw.sessions||[], drafts: raw.drafts||{}, settings: raw.settings||{restDefault:90} };
      save(); closeModal(); go('home'); toast('✅ Data imported');
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ===================== Helpers ===================== */
function val(id){ return (document.getElementById(id)||{}).value||''; }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(sec){ sec=Math.max(0,Math.round(sec||0)); const m=Math.floor(sec/60),s=sec%60;
  return m+':'+String(s).padStart(2,'0'); }
function splitTime(sec){ sec=Math.max(0,Math.round(sec||0)); return {m:Math.floor(sec/60), s:sec%60}; }
function fmtElapsed(sec){ sec=Math.max(0,sec); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return (h?h+':'+String(m).padStart(2,'0'):m)+':'+String(s).padStart(2,'0'); }
function parseTime(str){ str=(str||'').trim(); if(str==='') return '';
  if(str.includes(':')){ const [m,s]=str.split(':'); return (parseInt(m)||0)*60+(parseInt(s)||0); }
  return parseInt(str)||0; }
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString(undefined,{day:'numeric',month:'short'}); }
function relDay(iso){
  const d=new Date(iso), now=new Date();
  const a=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const b=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=Math.round((b-a)/86400000);
  if(diff<=0) return 'Today';
  if(diff===1) return 'Yesterday';
  return diff+' days ago';
}
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

/* long-press on workout card to open menu */
document.addEventListener('contextmenu',e=>{
  const card=e.target.closest('.wcard');
  if(card){ e.preventDefault(); }
});

render();

/* cloud sync: initial pull + keep in sync on focus / reconnect */
startSyncLoops();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) pullRemote(); });
window.addEventListener('online',()=>{ pushRemote(); pullRemote(); });
</script>
